<script>
// ── Auth ──────────────────────────────────────────────────────────────────
var SESSION_KEY = 'bna_auth';
var HASH = 'cmFtb25jaXRveXB1bGdhcw==';

function checkLogin() {
  var val = document.getElementById('pwd-input').value;
  if (btoa(val) === HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  var app = document.getElementById('app');
  app.style.display = 'flex';
  if (!window._mapInited) initMap();
}

// Auto-login if session active
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.addEventListener('DOMContentLoaded', showApp);
} else {
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('pwd-input').focus();
  });
}

var map, clusterGroup, markers = [], labels = [], visible = [];

function initMap() {
  window._mapInited = true;

  map = L.map('map', { preferCanvas: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  function getColor(p) {
    if (!p || p < 80000)  return '#22c55e';
    if (p < 150000)       return '#3b82f6';
    if (p < 220000)       return '#f97316';
    return '#ef4444';
  }
  function fmtPrice(p, m) {
    if (!p) return 'Consultar';
    var pfx = (m || 'USD') + ' ';
    if (p >= 1000000) return pfx + (p / 1000000).toFixed(1) + 'M';
    if (p >= 1000)    return pfx + (p / 1000).toFixed(0) + 'K';
    return pfx + p;
  }
  function makeIcon(color) {
    return L.divIcon({
      className: '',
      html: '<div style="width:12px;height:12px;border-radius:50%;background:' + color + ';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>',
      iconSize: [12,12], iconAnchor: [6,6], popupAnchor: [0,-10]
    });
  }

  var LabelOverlay = L.Layer.extend({
    initialize: function(latlng, text) { this._latlng = latlng; this._text = text; },
    onAdd: function(m) {
      this._map = m;
      var d = document.createElement('div');
      d.className = 'price-label';
      d.textContent = this._text;
      this._el = d;
      m.getPanes().overlayPane.appendChild(d);
      m.on('zoom viewreset moveend', this._update, this);
      this._update();
    },
    onRemove: function(m) {
      m.getPanes().overlayPane.removeChild(this._el);
      m.off('zoom viewreset moveend', this._update, this);
    },
    _update: function() {
      var pt = this._map.latLngToLayerPoint(this._latlng);
      this._el.style.left = pt.x + 'px';
      this._el.style.top  = pt.y + 'px';
    },
    show: function() { this._el.style.display = 'block'; },
    hide: function() { this._el.style.display = 'none'; }
  });

  clusterGroup = L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 50 });

  DATA.forEach(function(p, i) {
    var color  = getColor(p.precio);
    var price  = fmtPrice(p.precio, p.moneda);
    var latlng = L.latLng(p.lat, p.lng);

    var m = L.marker(latlng, { icon: makeIcon(color) });

    var imgH = p.imagen
      ? '<img class="popup-img" src="' + p.imagen + '" loading="lazy" onerror="this.style.display=\'none\'">'
      : '';
    var body = '<div class="popup-body"><div class="popup-addr">&#128205; ' + (p.direccion || p.localidad + ', Córdoba') + '</div>';
    if (p.localidad)          body += '<div class="popup-row"><span class="popup-key">Localidad</span><span class="popup-val">' + p.localidad + '</span></div>';
    if (p.dormitorios)        body += '<div class="popup-row"><span class="popup-key">Dormitorios</span><span class="popup-val">' + p.dormitorios + '</span></div>';
    if (p.banos)              body += '<div class="popup-row"><span class="popup-key">Baños</span><span class="popup-val">' + p.banos + '</span></div>';
    if (p.superficieCubierta) body += '<div class="popup-row"><span class="popup-key">Sup. cubierta</span><span class="popup-val">' + p.superficieCubierta + ' m²</span></div>';
    if (p.superficieTotal)    body += '<div class="popup-row"><span class="popup-key">Sup. total</span><span class="popup-val">' + p.superficieTotal + ' m²</span></div>';
    body += '</div>';

    var popup = imgH
      + '<div class="popup-header"><div class="popup-price">' + price + '</div><div class="popup-title">' + p.titulo + '</div></div>'
      + body
      + '<a href="https://mashogaresconbna.com.ar/propiedad/' + p.id + '" target="_blank" class="popup-link">Ver propiedad completa &rarr;</a>';

    m.bindPopup(popup, { maxWidth: 270 });
    clusterGroup.addLayer(m);
    markers.push(m);
    visible.push(true);

    var lbl = new LabelOverlay(latlng, price);
    lbl.addTo(map);
    labels.push(lbl);
  });

  map.addLayer(clusterGroup);
  var allLL = DATA.map(function(p) { return [p.lat, p.lng]; });
  map.fitBounds(L.latLngBounds(allLL), { padding: [40,40] });

  function updateLabels() {
    var show = map.getZoom() >= ZOOM_THRESHOLD;
    labels.forEach(function(lbl, i) { visible[i] ? (show ? lbl.show() : lbl.hide()) : lbl.hide(); });
  }
  map.on('zoomend', updateLabels);
  clusterGroup.on('animationend', updateLabels);
  updateLabels();

  var legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    var d = L.DomUtil.create('div', 'legend');
    d.innerHTML = '<b>Precio (USD)</b>'
      + '<div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Hasta 80.000</div>'
      + '<div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>80.001 – 150.000</div>'
      + '<div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>150.001 – 220.000</div>'
      + '<div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Más de 220.000</div>';
    return d;
  };
  legend.addTo(map);
}

// ── Filters ───────────────────────────────────────────────────────────────
function applyFilters() {
  var maxP = parseFloat(document.getElementById('maxP').value) || Infinity;
  var minP = parseFloat(document.getElementById('minP').value) || 0;
  var loc  = document.getElementById('locF').value.toLowerCase().trim();
  var showLbl = map.getZoom() >= ZOOM_THRESHOLD;
  var count = 0;
  DATA.forEach(function(p, i) {
    var show = true;
    if (p.precio != null && (p.precio > maxP || p.precio < minP)) show = false;
    if (loc && p.localidad && p.localidad.toLowerCase().indexOf(loc) < 0) show = false;
    visible[i] = show;
    if (show) { clusterGroup.addLayer(markers[i]); if (showLbl) labels[i].show(); else labels[i].hide(); count++; }
    else      { clusterGroup.removeLayer(markers[i]); labels[i].hide(); }
  });
  document.getElementById('visibleCount').textContent = count;
  document.getElementById('badge').textContent = count + ' propiedades';
}

function resetFilters() {
  document.getElementById('maxP').value = '';
  document.getElementById('minP').value = '';
  document.getElementById('locF').value = '';
  var showLbl = map.getZoom() >= ZOOM_THRESHOLD;
  DATA.forEach(function(p, i) {
    visible[i] = true;
    clusterGroup.addLayer(markers[i]);
    if (showLbl) labels[i].show(); else labels[i].hide();
  });
  document.getElementById('visibleCount').textContent = DATA.length;
  document.getElementById('badge').textContent = DATA.length + ' propiedades';
}
</script>

<script>
function fixHeight() {
  var vh = window.innerHeight;
  document.body.style.height = vh + 'px';
  document.getElementById('app').style.height = vh + 'px';
  var header = document.getElementById('header');
  var controls = document.getElementById('controls');
  var mapEl = document.getElementById('map');
  if (header && controls && mapEl) {
    var used = header.offsetHeight + controls.offsetHeight;
    mapEl.style.height = (vh - used) + 'px';
  }
}
window.addEventListener('load', fixHeight);
window.addEventListener('resize', fixHeight);
// iOS fires resize when address bar shows/hides
window.addEventListener('orientationchange', function() { setTimeout(fixHeight, 300); });
</script>
