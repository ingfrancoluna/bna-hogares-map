name: Refresh all (cron)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run BNA scraper
        run: node scrape-bna.js
        continue-on-error: true

      - name: Run Argenprop scraper
        run: node scrape-argenprop.js
        continue-on-error: true

      - name: Run Zonaprop scraper
        run: node scrape-zonaprop.js
        continue-on-error: true

      - name: Run La Voz scraper
        run: node scrape-lavoz.js
        continue-on-error: true

      - name: Run CordobaProp scraper
        run: node scrape-cordobaprop.js
        continue-on-error: true

      - name: Commit data files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-bna.json data-argenprop.json data-zonaprop.json data-lavoz.json data-cordobaprop.json geocode-cache.json cordobaprop-coords-cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios — no commit."
          else
            git commit -m "chore(data): refresh propiedades [skip ci]"
            git push
          fi
