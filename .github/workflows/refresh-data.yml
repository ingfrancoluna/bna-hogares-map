name: Refresh data

on:
  workflow_dispatch:
  # cron desactivado hasta validar la fase 1.
  # schedule:
  #   - cron: '0 */6 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scrape.js

      - name: Upload data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-output
          path: data.json
          retention-days: 7
