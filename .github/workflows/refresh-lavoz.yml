name: Refresh La Voz

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run La Voz scraper
        run: node scrape-lavoz.js

      - name: Commit data files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-lavoz.json geocode-cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios — no commit."
          else
            git pull --rebase origin main
            git commit -m "chore(data): refresh lavoz [skip ci]"
            git push
          fi
