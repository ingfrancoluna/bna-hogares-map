name: Refresh MercadoLibre

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      # ML bloquea las IPs de GH Actions con redirect a /account-verification.
      # Tor sortea el bloqueo cambiando la IP saliente a un exit node random.
      - name: Install and start Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          # ML probablemente geofencea: con exit nodes europeos no muestra propiedades AR.
          # Restringimos exits a países latinoamericanos (donde ML opera) y fallback US/CA.
          sudo tee -a /etc/tor/torrc > /dev/null <<EOF
          ExitNodes {ar},{br},{cl},{uy},{co},{mx},{pe},{us}
          StrictNodes 1
          EOF
          sudo service tor restart
          # Tor tarda 10-30s en establecer un circuito (más con ExitNodes restringido).
          for i in $(seq 1 45); do
            sleep 2
            if curl --socks5-hostname 127.0.0.1:9050 -s --max-time 5 https://api.ipify.org > /tmp/ip 2>/dev/null && [ -s /tmp/ip ]; then
              IP=$(cat /tmp/ip)
              echo "Tor listo. IP saliente: $IP"
              COUNTRY=$(curl --socks5-hostname 127.0.0.1:9050 -s --max-time 5 "https://ipapi.co/$IP/country/" 2>/dev/null || echo "?")
              echo "País: $COUNTRY"
              exit 0
            fi
          done
          echo "Tor no se levantó en 90s"
          exit 1

      - name: Run MercadoLibre scraper
        env:
          MELI_PROXY: socks5://127.0.0.1:9050
        run: node scrape-meli.js

      - name: Commit data files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-meli.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios — no commit."
          else
            git commit -m "chore(data): refresh meli [skip ci]"
            git pull --rebase origin main
            git push
          fi
