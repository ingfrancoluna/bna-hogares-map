name: Refresh MercadoLibre

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run MercadoLibre scraper
        run: node scrape-meli.js

      - name: Commit data files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-meli.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios — no commit."
          else
            git commit -m "chore(data): refresh meli [skip ci]"
            git pull --rebase origin main
            git push
          fi
